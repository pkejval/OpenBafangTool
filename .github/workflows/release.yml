name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  version:
    name: Prepare version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate release version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          if [[ "${BASE_VERSION}" == *-* ]]; then
            VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"
          else
            VERSION="${BASE_VERSION}-build.${GITHUB_RUN_NUMBER}"
          fi
          TAG="v${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

  desktop:
    name: Build ${{ matrix.name }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            target: --win
            artifact-name: windows
            artifact-path: |
              release/build/*.exe
              release/build/*.msi
              release/build/*.zip
              release/build/*.blockmap
          - name: Linux
            os: ubuntu-latest
            target: --linux
            artifact-name: linux
            artifact-path: |
              release/build/*.AppImage
              release/build/*.deb
              release/build/*.rpm
              release/build/*.tar.gz
              release/build/*.yml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libusb-1.0-0-dev

      - name: Install dependencies
        run: npm install

      - name: Set package version
        shell: bash
        run: |
          npm version --no-git-tag-version "${{ needs.version.outputs.version }}"
          cd release/app
          npm version --no-git-tag-version "${{ needs.version.outputs.version }}"

      - name: Build application
        run: npm run build

      - name: Build distributable
        run: npx electron-builder build ${{ matrix.target }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ${{ matrix.name }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  android:
    name: Build Android
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Android project
        id: android
        shell: bash
        run: |
          if [ -f android/gradlew ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Android project not found; skipping Android artifact build."
          fi

      - name: Setup Java
        if: steps.android.outputs.enabled == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Android release
        if: steps.android.outputs.enabled == 'true'
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload Android artifact
        if: steps.android.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - version
      - desktop
      - android
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: OpenBafangTool ${{ needs.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: artifacts/**/*
